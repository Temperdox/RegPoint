name: RegPoint CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Security Scans (SAST + SCA)
  # ─────────────────────────────────────────
  sast-bandit:
    name: "SAST - Bandit (Python Security)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit[toml]
      - name: Run Bandit SAST scan
        run: bandit -r events/ RegPoint/ -f json -o bandit-report.json --severity-level medium || true
      - name: Display Bandit results
        run: bandit -r events/ RegPoint/ -f screen --severity-level medium || true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  dependency-scan:
    name: "SCA - Safety (Dependency Vulnerabilities)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Safety
        run: pip install safety
      - name: Run Safety dependency scan
        run: safety check --output json --save-json safety-report.json || true
      - name: Display Safety results
        run: safety check || true
      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        with:
          name: safety-sca-report
          path: safety-report.json

  secret-scan:
    name: "Secret Scanning - detect-secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Run secret scan
        run: detect-secrets scan --all-files --exclude-files '\.git/.*' > secrets-report.json
      - name: Display results
        run: cat secrets-report.json
      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secrets-report.json

  # ─────────────────────────────────────────
  # Stage 2: Tests
  # ─────────────────────────────────────────
  test:
    name: "Django Tests"
    runs-on: ubuntu-latest
    needs: [sast-bandit, dependency-scan, secret-scan]
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-testing-fallback-not-for-prod' }}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "testserver,localhost,127.0.0.1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install coverage
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests with coverage
        run: coverage run manage.py test events --verbosity=2
      - name: Coverage report
        run: coverage report

  # ─────────────────────────────────────────
  # Stage 3: Deploy to Azure App Service
  # ─────────────────────────────────────────
  deploy:
    name: "Deploy to Azure App Service"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect static files
        run: python manage.py collectstatic --noinput
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@b686016b4de8820a23519503685d8d03fbfa03a6  # v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
