{% extends "events/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            Invalid username or password. Please try again.
                        </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label" for="id_username">Username</label>
                            <input type="text" id="id_username" name="username" class="form-control" placeholder="Username" autocomplete="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="id_password">Password</label>
                            <input type="password" id="id_password" name="password" class="form-control" placeholder="Password" autocomplete="current-password" required>
                        </div>
                        {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}
                        <button type="submit" class="btn btn-accent w-100 mb-3">Login</button>
                        <p class="text-center text-muted mb-0">
                            Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
