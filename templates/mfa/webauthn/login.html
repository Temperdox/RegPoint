{% extends "events/base.html" %}

{% block title %}Sign In with Passkey{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm auth-card">
                <div class="card-body p-4 text-center">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <a href="{% url 'account_login' %}"
                           class="btn btn-sm btn-light auth-back"
                           aria-label="Back to login">
                            <i class="bi bi-chevron-left" aria-hidden="true"></i>
                        </a>
                        <span class="invisible" aria-hidden="true">
                            <i class="bi bi-chevron-left"></i>
                        </span>
                    </div>
                    <i class="bi bi-fingerprint fs-1 text-primary d-block mb-3" aria-hidden="true"></i>
                    <h1 class="h3 mb-3">Sign In with Passkey</h1>
                    <p class="text-muted">Use your device's biometric or security key to sign in.</p>
                    <form method="post" id="passkey-login-form">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-accent btn-lg w-100">
                            <i class="bi bi-fingerprint me-2"></i>Use Passkey
                        </button>
                    </form>
                    <hr>
                    <p class="text-muted small mb-0">
                        <a href="{% url 'account_login' %}">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
