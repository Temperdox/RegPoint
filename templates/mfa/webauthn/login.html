{% extends "events/base.html" %}

{% block title %}Sign In with Passkey{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-fingerprint fs-1 text-primary d-block mb-3"></i>
                    <h3 class="mb-3">Sign In with Passkey</h3>
                    <p class="text-muted">Use your device's biometric or security key to sign in.</p>
                    <form method="post" id="passkey-login-form">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-accent btn-lg w-100">
                            <i class="bi bi-fingerprint me-2"></i>Use Passkey
                        </button>
                    </form>
                    <hr>
                    <p class="text-muted small mb-0">
                        <a href="{% url 'account_login' %}">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
