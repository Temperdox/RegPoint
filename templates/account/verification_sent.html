{% extends "events/base.html" %}

{% block title %}Verify Your Email{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5" style="max-width:460px;">
            <div class="card shadow-sm auth-card">
                <div class="card-body p-4 text-center">
                    <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center mb-3"
                         style="width:56px;height:56px;">
                        <i class="bi bi-envelope-check fs-3 text-primary" aria-hidden="true"></i>
                    </div>
                    <h1 class="h4 mb-2">Verify Your Email</h1>
                    <p class="text-muted">
                        We've sent a verification email. Follow the link inside to finish signing up.
                        Check your spam folder if you don't see it within a few minutes.
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-link small text-muted">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
