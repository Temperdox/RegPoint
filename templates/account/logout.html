{% extends "events/base.html" %}

{% block title %}Logout{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-box-arrow-right fs-1 text-primary d-block mb-3"></i>
                    <h4>Sign Out</h4>
                    <p class="text-muted">Are you sure you want to sign out?</p>
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-accent">Yes, Sign Out</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
